<style>

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#333;min-height:100vh;-webkit-tap-highlight-color:transparent}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:28px 20px 24px;text-align:center;position:relative}

.stat-label{font-size:11px;color:#999;margin-top:2px}

.search-box{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}

.search-input-wrap{display:flex;gap:8px}
.search-input{flex:1;border:2px solid #e8ecf1;border-radius:10px;padding:12px 14px;font-size:15px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.search-input:focus{border-color:#0f3460}
.search-btn{background:linear-gradient(135deg,#0f3460,#1a5276);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;-webkit-appearance:none}
.search-btn:active{opacity:.85}
.mode-tabs{display:flex;gap:8px;margin-bottom:16px}
.mode-tab{flex:1;text-align:center;padding:12px 10px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:2px solid #e8ecf1;background:#fff;-webkit-appearance:none;user-select:none}
.mode-tab.active{background:#0f3460;color:#fff;border-color:#0f3460}
.hot-tags{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}
.hot-tag{background:#f0f4f8;border-radius:16px;padding:8px 14px;font-size:12px;color:#555;cursor:pointer;transition:all .2s;user-select:none;-webkit-appearance:none}
.hot-tag:active{background:#0f3460;color:#fff}
.results{margin-top:16px}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.result-count{font-size:15px;font-weight:600;color:#0f3460}
.result-tag{font-size:11px;background:#e8f5e9;color:#2e7d32;padding:3px 10px;border-radius:10px}
.result-card{background:#fff;border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05);border-left:4px solid #0f3460}
.result-card .cname{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.result-card .cloc{font-size:12px;color:#888;margin-bottom:10px}
.result-card .irow{display:flex;align-items:flex-start;margin-bottom:6px;font-size:13px;line-height:1.6}
.result-card .ilbl{color:#888;min-width:50px;flex-shrink:0}
.result-card .ival{color:#444;flex:1}
.result-card .mscore{display:inline-block;background:#fff3e0;color:#e65100;font-size:11px;padding:2px 8px;border-radius:8px;margin-top:8px}
.cta-box{background:linear-gradient(135deg,#fff3e0,#fce4ec);border-radius:14px;padding:20px;margin-top:16px;text-align:center}
.cta-box .cta-title{font-size:16px;font-weight:700;color:#c62828;margin-bottom:8px}
.cta-box .cta-desc{font-size:13px;color:#555;line-height:1.6;margin-bottom:14px}
.cta-btn{display:inline-block;background:linear-gradient(135deg,#c62828,#e53935);color:#fff;border:none;border-radius:24px;padding:14px 32px;font-size:16px;font-weight:600;cursor:pointer;width:100%;max-width:300px;-webkit-appearance:none}
.cta-btn:active{opacity:.85}
.cta-sec{display:block;margin-top:12px;font-size:13px;color:#666}
.lead-form{display:none;background:#fff;border-radius:14px;padding:20px;margin-top:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.lead-form.show{display:block}
.lead-form h3{font-size:16px;margin-bottom:14px;color:#1a1a2e}
.lead-input{width:100%;border:2px solid #e8ecf1;border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:10px;outline:none;-webkit-appearance:none}
.lead-input:focus{border-color:#0f3460}
.lead-submit{width:100%;background:linear-gradient(135deg,#0f3460,#1a5276);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;-webkit-appearance:none}
.lead-submit:active{opacity:.85}
.empty-state{text-align:center;padding:40px 20px;color:#999}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state .msg{font-size:14px;line-height:1.6}
.footer{text-align:center;padding:24px 16px;color:#bbb;font-size:11px;line-height:1.8}
.loading{display:none;text-align:center;padding:30px}
.loading.show{display:block}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #e8ecf1;border-top-color:#0f3460;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .ltext{font-size:13px;color:#999;margin-top:10px}
.loading-mask{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.5);z-index:999;justify-content:center;align-items:center}
.loading-mask.show{display:flex}
</style>
</head>
<body>

<script>
(function() {
  'use strict';

  var INDO_DATA = [];
  var CN_DATA = [];
  var dataLoaded = false;

  // Bilingual dictionary
  var BD = {
    '焊接': ['welding','weld','solder'],
    'welding': ['焊接','焊'],
    '视觉传感器': ['vision sensor','visual sensor','3d vision','machine vision'],
    'vision sensor': ['视觉传感器','视觉','3D视觉'],
    '3d视觉': ['3d vision','3d camera','stereo vision','depth camera'],
    '3d vision': ['3d视觉','三维视觉'],
    '机器人': ['robot','robotic','robotics','automaton'],
    'robot': ['机器人','机械人'],
    '协作机器人': ['collaborative robot','cobot','cobotic'],
    'collaborative robot': ['协作机器人','协作机械臂','cobot'],
    '人形机器人': ['humanoid robot','humanoid'],
    'humanoid robot': ['人形机器人'],
    'agv': ['agv','automated guided vehicle','logistics robot','transport robot'],
    '物流机器人': ['logistics robot','agv','warehouse robot','transport robot'],
    'logistics robot': ['物流机器人','AGV','搬运机器人','仓储机器人'],
    '仓储': ['warehouse','warehousing','storage','logistics'],
    'warehouse': ['仓储','仓库','物流仓储'],
    '搬运': ['handling','conveying','transport','carrying'],
    'handling': ['搬运','输送','传送'],
    '激光切割': ['laser cutting','laser processing','laser machine'],
    'laser cutting': ['激光切割','激光加工','激光设备'],
    '激光': ['laser'],
    'laser': ['激光'],
    '自动化产线': ['automation line','production line','automated line','assembly line'],
    'automation line': ['自动化产线','自动化生产线','生产线'],
    '自动化': ['automation','automated','automatic'],
    'automation': ['自动化'],
    '机械臂': ['robot arm','mechanical arm','robotic arm','manipulator'],
    'robot arm': ['机械臂','机器人手臂','机械手臂'],
    '具身智能': ['embodied ai','embodied intelligence','physical ai'],
    'embodied ai': ['具身智能'],
    '传感器': ['sensor','sensing','transducer','detector'],
    'sensor': ['传感器','感应器','探测','检测'],
    '注塑': ['injection molding','injection moulding','plastic molding'],
    'injection molding': ['注塑','注塑成型'],
    '包装': ['packaging','packing','wrapping'],
    'packaging': ['包装','打包','封装'],
    '数控': ['cnc','numerical control'],
    'cnc': ['数控','数控加工','数控机床'],
    '矿业': ['mining','mineral','ore','quarry'],
    'mining': ['矿业','采矿','矿石'],
    '农业': ['agriculture','farming','agricultural'],
    'agriculture': ['农业','农耕','种植'],
    '电子制造': ['electronics manufacturing','smt','pcb assembly'],
    'electronics manufacturing': ['电子制造','电子组装','SMT'],
    '新能源': ['new energy','renewable energy','solar','battery','photovoltaic'],
    'new energy': ['新能源','清洁能源','太阳能','光伏'],
    '太阳能': ['solar','photovoltaic','pv'],
    'solar': ['太阳能','光伏'],
    '汽车零部件': ['auto parts','automotive parts','car parts','vehicle components'],
    'auto parts': ['汽车零部件','汽车配件','车辆零部件'],
    '食品加工': ['food processing','food production','food manufacturing'],
    'food processing': ['食品加工','食品生产'],
    '纺织': ['textile','textiles','fabric','weaving'],
    'textile': ['纺织','织物','布料'],
    '芯片': ['chip','semiconductor','ic','integrated circuit'],
    'chip': ['芯片','半导体','集成电路'],
    '半导体': ['semiconductor','chip','wafer'],
    'semiconductor': ['半导体','芯片','晶圆'],
    '伺服': ['servo','servo motor','servo drive'],
    'servo': ['伺服','伺服电机','伺服驱动'],
    '减速器': ['reducer','gearbox','speed reducer','harmonic drive'],
    'reducer': ['减速器','减速机'],
    '无人机': ['drone','uav','unmanned aerial vehicle'],
    'drone': ['无人机','无人飞行器'],
    '末端执行器': ['end effector','gripper','end-of-arm tool'],
    'end effector': ['末端执行器','夹爪'],
    '夹爪': ['gripper','clamp','end effector'],
    'gripper': ['夹爪','夹具','末端执行器'],
    '控制器': ['controller','control system','motion controller'],
    'controller': ['控制器','控制系统'],
    '电机': ['motor','electric motor','servo motor'],
    'motor': ['电机','电动机','马达'],
    '金属加工': ['metal processing','metalworking','metal fabrication'],
    'metal processing': ['金属加工','金属制造'],
    '医疗器械': ['medical device','medical equipment'],
    'medical device': ['医疗器械','医疗设备'],
    '安全设备': ['safety equipment','protective equipment'],
    'safety equipment': ['安全设备','防护设备'],
    '橡胶': ['rubber','elastomer'],
    'rubber': ['橡胶','弹性体'],
    '塑料': ['plastic','polymer','resin'],
    'plastic': ['塑料','高分子','树脂'],
    '减速机': ['reducer','gearbox','speed reducer'],
    '齿轮': ['gear','gears','gearbox'],
    'gear': ['齿轮','齿轮箱'],
    '液压': ['hydraulic','hydraulics'],
    'hydraulic': ['液压','液压系统'],
    '气动': ['pneumatic','pneumatics'],
    'pneumatic': ['气动','气动元件'],
    '视觉': ['vision','visual','camera','imaging'],
    'vision': ['视觉','图像','相机'],
    '检测': ['inspection','detection','testing'],
    'inspection': ['检测','检验','测试'],
    '装配': ['assembly','assembling'],
    'assembly': ['装配','组装'],
    '喷涂': ['painting','coating','spraying'],
    'painting': ['喷涂','喷漆','涂装'],
    '码垛': ['palletizing','palletize','stacking'],
    'palletizing': ['码垛','堆垛'],
    '打磨': ['grinding','polishing','buffing'],
    'grinding': ['打磨','抛光','磨削'],
    '切割': ['cutting','cut'],
    'cutting': ['切割','裁切'],
    '缝纫': ['sewing','stitching'],
    'sewing': ['缝纫','缝制'],
    '清洁': ['cleaning','clean'],
    'cleaning': ['清洁','清洗']
  };

  var currentMode = 'indo';

  function expandKeywords(input) {
    var lo = input.toLowerCase();
    var cnKw = {};
    var enKw = {};
    var hasCjk = /[\u4e00-\u9fff]/;

    for (var t in BD) {
      if (BD.hasOwnProperty(t) && lo.indexOf(t.toLowerCase()) >= 0) {
        if (hasCjk.test(t)) {
          cnKw[t] = true;
          BD[t].forEach(function(x) { enKw[x.toLowerCase()] = true; });
        } else {
          enKw[t.toLowerCase()] = true;
          BD[t].forEach(function(x) { cnKw[x] = true; });
        }
      }
    }

    var cnArr = Object.keys(cnKw);
    var enArr = Object.keys(enKw);

    if (cnArr.length === 0 && enArr.length === 0) {
      if (hasCjk.test(input)) { cnArr.push(lo); }
      else { enArr.push(lo); }
    }

    return { cn: cnArr, en: enArr };
  }

  function matchIndo(keywordsEn) {
    var results = [];
    var kl = keywordsEn.map(function(k) { return k.toLowerCase(); });
    for (var i = 0; i < INDO_DATA.length; i++) {
      var c = INDO_DATA[i];
      var tx = c.t || '';
      var sc = 0;
      for (var j = 0; j < kl.length; j++) {
        if (tx.indexOf(kl[j]) >= 0) sc++;
      }
      if (sc >= 1) results.push({ n: c.n, c: c.c, s: c.s, r: c.r, i: c.i, d: c.d, h: c.h, score: sc });
    }
    results.sort(function(a, b) { return b.score - a.score; });
    return results;
  }

  function matchCn(keywordsCn) {
    var results = [];
    var kl = keywordsCn.map(function(k) { return k.toLowerCase(); });
    for (var i = 0; i < CN_DATA.length; i++) {
      var c = CN_DATA[i];
      var tx = c.t || '';
      var sc = 0;
      for (var j = 0; j < kl.length; j++) {
        if (tx.indexOf(kl[j]) >= 0) sc++;
      }
      if (sc >= 1) results.push({ n: c.n, p: c.p, c: c.c, cf: c.cf, l: c.l, r: c.r, pi: c.pi, score: sc });
    }
    results.sort(function(a, b) { return b.score - a.score; });
    return results;
  }

  function renderResults(results, mode) {
    var html = '';
    if (results.length === 0) {
      html = '<div class="empty-state"><div class="icon">🔍</div><div class="msg">暂未找到匹配结果<br/>请尝试其他关键词或联系我们的专家</div></div>';
      return { html: html, total: 0 };
    }

    if (mode === 'indo') {
      html += '<div class="result-header"><span class="result-count">找到 ' + results.length + ' 家匹配企业</span><span class="result-tag">实时匹配</span></div>';
      var show = results.slice(0, 2);
      for (var i = 0; i < show.length; i++) {
        var c = show[i];
        html += '<div class="result-card">';
        html += '<div class="cname">' + escapeHtml(c.n) + '</div>';
        html += '<div class="cloc">📍 ' + escapeHtml(c.c) + '</div>';
        if (c.s) html += '<div class="irow"><span class="ilbl">规模</span><span class="ival">' + escapeHtml(c.s) + '</span></div>';
        if (c.r) html += '<div class="irow"><span class="ilbl">营收</span><span class="ival">' + escapeHtml(c.r) + '</span></div>';
        if (c.i) html += '<div class="irow"><span class="ilbl">行业</span><span class="ival">' + escapeHtml(c.i) + '</span></div>';
        if (c.d) html += '<div class="irow"><span class="ilbl">业务</span><span class="ival">' + escapeHtml(c.d.substring(0, 120)) + '…</span></div>';
        html += '<div class="irow"><span class="ilbl">HS编码</span><span class="ival">关联 ' + c.h + ' 个品类</span></div>';
        html += '<span class="mscore">匹配度: ' + c.score + ' 个关键词命中</span>';
        html += '</div>';
      }
      if (results.length > 2) {
        html += '<div style="text-align:center;color:#999;font-size:13px;padding:8px 0">还有 ' + (results.length - 2) + ' 家企业待解锁…</div>';
      }
    } else {
      var hc = 0;
      for (var k = 0; k < results.length; k++) {
        if (results[k].cf === '高' || results[k].cf === '中') hc++;
      }
      html += '<div class="result-header"><span class="result-count">找到 ' + results.length + ' 家匹配供应商</span><span class="result-tag">' + hc + ' 家中高置信度</span></div>';
      var show2 = results.slice(0, 2);
      for (var i2 = 0; i2 < show2.length; i2++) {
        var c2 = show2[i2];
        html += '<div class="result-card">';
        html += '<div class="cname">' + escapeHtml(c2.n) + '</div>';
        html += '<div class="cloc">📍 ' + escapeHtml(c2.p) + ' ' + escapeHtml(c2.c) + '</div>';
        html += '<div class="irow"><span class="ilbl">置信度</span><span class="ival">' + escapeHtml(c2.cf) + '</span></div>';
        if (c2.l) html += '<div class="irow"><span class="ilbl">分类</span><span class="ival">' + escapeHtml(c2.l) + '</span></div>';
        if (c2.r) html += '<div class="irow"><span class="ilbl">注册资本</span><span class="ival">' + escapeHtml(c2.r) + '</span></div>';
        if (c2.pi && c2.pi !== '待核实（见官网）' && c2.pi !== 'null') {
          html += '<div class="irow"><span class="ilbl">产品</span><span class="ival">' + escapeHtml(c2.pi) + '</span></div>';
        }
        html += '<span class="mscore">匹配度: ' + c2.score + ' 个关键词命中</span>';
        html += '</div>';
      }
      if (results.length > 2) {
        html += '<div style="text-align:center;color:#999;font-size:13px;padding:8px 0">还有 ' + (results.length - 2) + ' 家供应商待解锁…</div>';
      }
    }

    return { html: html, total: results.length };
  }

  function renderCta(total, mode) {
    var html = '';
    if (mode === 'indo') {
      html = '<div class="cta-title">⚠️ 解锁全部 ' + total + ' 家精准买家</div>' +
        '<div class="cta-desc">获取完整联系方式、历史采购数据及HS编码关税分析<br/>抢占印尼市场先机</div>' +
        '<button class="cta-btn" id="ctaBtn">立即获取【¥3,000出海破冰包】</button>' +
        '<span class="cta-sec">或回复【公司名+联系电话】，专家光速对接</span>';
    } else {
      html = '<div class="cta-title">💡 获取完整供应商名录 + 一体化方案</div>' +
        '<div class="cta-desc">解锁 ' + total + ' 家供应商完整产品目录、工厂报价<br/>我们提供定制一体化解决方案，降低30%成本</div>' +
        '<button class="cta-btn" id="ctaBtn">留下联系方式，24h内获取方案</button>';
    }
    return html;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function doSearch() {
    var q = document.getElementById('qi').value.trim();
    if (!q) { alert('请输入产品或需求关键词'); return; }
    if (!dataLoaded) { alert('数据加载中，请稍候再试'); return; }

    document.getElementById('res').innerHTML = '';
    document.getElementById('cta').style.display = 'none';
    document.getElementById('lf').className = 'lead-form';
    document.getElementById('ld').className = 'loading show';

    setTimeout(function() {
      var kw = expandKeywords(q);
      var results, mode = currentMode;

      if (mode === 'indo') {
        results = matchIndo(kw.en);
      } else {
        results = matchCn(kw.cn);
      }

      var rendered = renderResults(results, mode);
      document.getElementById('ld').className = 'loading';
      document.getElementById('res').innerHTML = rendered.html;

      if (rendered.total > 0) {
        document.getElementById('cta').innerHTML = renderCta(rendered.total, mode);
        document.getElementById('cta').style.display = 'block';

        var ctaBtn = document.getElementById('ctaBtn');
        if (ctaBtn) {
          ctaBtn.addEventListener('click', function() {
            showLeadForm();
          });
        }
      }
    }, 600);
  }

  function showLeadForm() {
    var lf = document.getElementById('lf');
    lf.className = 'lead-form show';
    setTimeout(function() {
      lf.scrollIntoView({ behavior: 'smooth' });
    }, 100);
  }

  function submitLead() {
    var co = document.getElementById('lc').value.trim();
    var na = document.getElementById('ln').value.trim();
    var ph = document.getElementById('lp').value.trim();
    if (!co || !na || !ph) { alert('请填写公司名称、姓名和联系方式'); return; }
    var q = document.getElementById('qi').value.trim();
    alert('✅ 提交成功！\n\n我们的出海专家将在24小时内与您联系。\n\n匹配关键词：' + q + '\n公司：' + co);
    document.getElementById('lf').className = 'lead-form';
  }

  function switchMode(mode) {
    currentMode = mode;
    document.getElementById('tI').className = mode === 'indo' ? 'mode-tab active' : 'mode-tab';
    document.getElementById('tC').className = mode === 'cn' ? 'mode-tab active' : 'mode-tab';
    document.getElementById('res').innerHTML = '';
    document.getElementById('cta').style.display = 'none';
    document.getElementById('lf').className = 'lead-form';
  }

  // Load data
  function loadData() {
    var indoPromise = fetch('indo_data.json').then(function(r) { return r.json(); });
    var cnPromise = fetch('cn_data.json').then(function(r) { return r.json(); });

    Promise.all([indoPromise, cnPromise]).then(function(results) {
      INDO_DATA = results[0];
      CN_DATA = results[1];
      dataLoaded = true;
    }).catch(function(err) {
      console.error('Data load error:', err);
      // Try inline fallback - data will be empty
      dataLoaded = true;
    });
  }

  // Initialize event listeners
  function init() {
    loadData();

    // Search button
    document.getElementById('searchBtn').addEventListener('click', doSearch);

    // Enter key
    document.getElementById('qi').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') doSearch();
    });

    // Mode tabs
    document.getElementById('tI').addEventListener('click', function() { switchMode('indo'); });
    document.getElementById('tC').addEventListener('click', function() { switchMode('cn'); });

    // Hot tags
    var tags = document.querySelectorAll('.hot-tag');
    for (var i = 0; i < tags.length; i++) {
      tags[i].addEventListener('click', function() {
        document.getElementById('qi').value = this.getAttribute('data-q');
        doSearch();
      });
    }

    // Submit button
    document.getElementById('submitBtn').addEventListener('click', submitLead);
  }

  // Start
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
